version: "3.8"

services:
  agentic-layer:
    build:
      context: ./Agentic Layer
      dockerfile: Dockerfile
    command: uvicorn main:app --reload --reload-dir /app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - ./.env
      - ./Terraform Agent/agent/.env
    environment:
      DEPLAI_LOCAL_PROJECTS_ROOT: /local-projects
      DEPLAI_GITHUB_REPOS_ROOT: /repos
      AGENT_LLM_BACKEND: openrouter
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
    volumes:
      # Docker socket — allows the container to manage other containers/volumes
      - /var/run/docker.sock:/var/run/docker.sock
      # Local project uploads — needed for isdir checks inside the container
      - ./Connector/tmp/local-projects:/local-projects:ro
      - ./Connector/tmp/repos:/repos:ro
      # Mount source code live — code changes take effect on save without rebuild
      - ./Agentic Layer:/app
      - "./Terraform Agent:/app/terraform_agent"
      - ./remediation_pipeline:/app/remediation_pipeline
      # KGagent — mounted alongside the agentic layer so graph.py can import it
      - ./KGagent:/app/KGagent:ro
      - ./diagram_cost-estimation_agent:/app/diagram_cost-estimation_agent
    networks:
      - deplai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  codebase_deplai:
  security_reports:
  LLM_Output:
  grype_db_cache:

networks:
  deplai:
    driver: bridge
