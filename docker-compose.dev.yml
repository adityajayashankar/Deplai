# Agentic Layer hot-reload setup for backend development only.
# For the complete local application use: docker compose up --build
services:
  agentic-layer:
    build:
      context: .
      dockerfile: Agentic Layer/Dockerfile
    command: uvicorn main:app --reload --reload-dir "/workspace/Agentic Layer" --host 0.0.0.0 --port 8000
    ports:
      - "8001:8000"
    env_file:
      - ./.env
      - ./Terraform Agent/agent/.env
    environment:
      DEPLAI_LOCAL_PROJECTS_ROOT: /local-projects
      DEPLAI_GITHUB_REPOS_ROOT: /repos
      AGENT_LLM_BACKEND: openrouter
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./Connector/tmp/local-projects:/local-projects:ro
      - ./Connector/tmp/repos:/repos:ro
      - ./Agentic Layer:/workspace/Agentic Layer
      - ./Terraform Agent:/workspace/Terraform Agent
      - ./remediation_pipeline:/workspace/remediation_pipeline
      - ./KGagent:/workspace/KGagent:ro
      - ./Diagram-Cost-Agent:/workspace/Diagram-Cost-Agent:ro
    restart: unless-stopped
