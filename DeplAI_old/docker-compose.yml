services:
  redis:
    image: redis:latest
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-server
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  backend:
    build: .
    container_name: deplai-backend
    command: python main.py
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - MQ_HOST=rabbitmq
    depends_on:
      - redis
      - rabbitmq

  github-worker:
    build: .
    container_name: deplai-github-worker
    command: python workers/github_deployment_worker.py
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - MQ_HOST=rabbitmq
    depends_on:
      - rabbitmq

  terraform-worker:
    build: .
    container_name: deplai-terraform-worker
    command: python workers/terraform_generator_worker.py
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - MQ_HOST=rabbitmq
    depends_on:
      - rabbitmq

  # Legacy Streamlit frontend removed.
  # Use React Connector UI instead:
  #   - http://localhost:3000/dashboard
  #   - http://localhost:3000/dashboard/pipeline

  # This is a one-time step that you must perform before running the application for the first time. This process indexes the Terraform documentation, which the agent uses to generate code.
  # indexer:
  #   build: .
  #   container_name: deplai-indexer
  #   command: python -m terraform_rag_agent.src.indexer
  #   volumes:
  #     - .:/app
  #   env_file:
  #     - .env

volumes:
  redis_data:
  rabbitmq_data: 
