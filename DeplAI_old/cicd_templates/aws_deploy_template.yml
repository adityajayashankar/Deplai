name: 'Deploy Terraform to AWS'

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    
    defaults:
      run:
        shell: bash
        working-directory: . # Assuming TF files are at the root of the repo

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v3

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: '##AWS_REGION##' # Placeholder for AWS Region

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '##TF_VERSION##' # Placeholder for Terraform version

      - name: 'Terraform Init'
        id: init
        run: terraform init

      - name: 'Terraform Plan'
        id: plan
        run: terraform plan -no-color

      - name: 'Terraform Apply'
        id: apply
        # This step will only run on the main branch
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -no-color 